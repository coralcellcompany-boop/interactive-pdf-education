<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuropsychiatry & Neurosurgery QBank</title>
<script src="quiz-embedded.js"></script>
<style>
:root {
  --accent: #1565c0;
  --green: #4caf50;
  --red: #f44336;
  --blue: #2196f3;
  --bg: #f0f2f5;
  --card: #fff;
  --text: #1e293b;
  --sidebar-w: 260px;
  --toolbar-h: 50px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

#sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w);
  background: #1a237e; color: #e2e8f0; display: flex; flex-direction: column; z-index: 100;
}
.logo { padding: 12px 14px; font-size: 14px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.1); line-height: 1.3; }
.logo small { font-weight: 400; opacity: 0.6; font-size: 11px; display: block; margin-top: 2px; }
.nav-search { padding: 8px 12px; }
.nav-search input {
  width: 100%; padding: 6px 10px; border-radius: 6px; border: none;
  background: rgba(255,255,255,0.1); color: #fff; font-size: 12px; outline: none;
}
.nav-search input::placeholder { color: rgba(255,255,255,0.4); }
.nav-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.nav-item {
  padding: 8px 14px; cursor: pointer; font-size: 12px; display: flex;
  justify-content: space-between; align-items: center; transition: background 0.15s;
}
.nav-item:hover { background: rgba(255,255,255,0.08); }
.nav-item.active { background: var(--accent); }
.nav-item.quiz-page { border-left: 3px solid var(--blue); }
.nav-item .badge { font-size: 9px; padding: 2px 5px; border-radius: 8px; background: rgba(255,255,255,0.15); }
.sidebar-footer {
  padding: 10px 14px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px;
}
.score-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 4px; }
.score-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }

#toolbar {
  position: fixed; top: 0; left: var(--sidebar-w); right: 0; height: var(--toolbar-h);
  background: var(--card); border-bottom: 1px solid rgba(0,0,0,0.08);
  display: flex; align-items: center; padding: 0 16px; gap: 10px; z-index: 90;
}
.tb-btn {
  border: none; background: none; cursor: pointer; padding: 6px 12px;
  border-radius: 6px; font-size: 13px; color: var(--text); transition: background 0.15s;
}
.tb-btn:hover { background: rgba(0,0,0,0.06); }
#pageInfo { font-size: 14px; font-weight: 600; }
.spacer { flex: 1; }
#pageHint { font-size: 12px; opacity: 0.5; }

#main {
  position: fixed; top: var(--toolbar-h); left: var(--sidebar-w); right: 0; bottom: 0;
  display: flex; justify-content: center; align-items: flex-start;
  overflow: auto; padding: 20px; background: var(--bg);
}

#pageWrap {
  position: relative; display: inline-block;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15); border-radius: 4px; overflow: hidden;
}
#pageImg { display: block; height: calc(100vh - var(--toolbar-h) - 40px); width: auto; user-select: none; }
#quizLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

.opt-zone {
  position: absolute; cursor: pointer;
  border: 2px solid transparent; border-radius: 6px; transition: all 0.2s;
}
.opt-zone:hover { background: rgba(33,150,243,0.12); border-color: rgba(33,150,243,0.4); }
.opt-zone.selected { border-color: var(--blue); background: rgba(33,150,243,0.15); }
.opt-zone.correct { border-color: var(--green) !important; background: rgba(76,175,80,0.2) !important; }
.opt-zone.wrong { border-color: var(--red) !important; background: rgba(244,67,54,0.18) !important; }

.q-row {
  position: absolute; left: 0; width: 100%; pointer-events: none;
  border-radius: 4px; transition: background 0.2s;
}
.q-row.answered-correct { background: rgba(76,175,80,0.07); }
.q-row.answered-wrong { background: rgba(244,67,54,0.05); }

.result-badge {
  position: absolute; font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; pointer-events: none; z-index: 15; opacity: 0; transition: opacity 0.3s;
}
.result-badge.show { opacity: 1; }
.result-badge.correct { background: var(--green); color: #fff; }
.result-badge.wrong { background: var(--red); color: #fff; }
.result-badge.no-answer { background: #ff9800; color: #fff; }

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600;
  z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.correct-toast { background: var(--green); color: #fff; }
.toast.wrong-toast { background: var(--red); color: #fff; }
.toast.info-toast { background: #ff9800; color: #fff; }

#statsModal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; justify-content: center; align-items: center;
}
#statsModal.show { display: flex; }
.stats-card {
  background: var(--card); border-radius: 16px; padding: 30px; min-width: 340px;
  text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
.stats-card h2 { font-size: 20px; margin-bottom: 16px; }
.stat-num { font-size: 42px; font-weight: 800; }
.stat-num.good { color: var(--green); }
.stat-num.bad { color: var(--red); }
.stat-label { font-size: 12px; opacity: 0.6; margin-top: 4px; }
.stats-row { display: flex; gap: 24px; justify-content: center; margin: 16px 0; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">
    Neuropsychiatry & Neurosurgery
    <small>ASM Minds QBank — 470 Questions</small>
  </div>
  <div class="nav-search"><input type="text" id="navSearch" placeholder="Search pages..." oninput="filterNav()"></div>
  <div class="nav-list" id="navList"></div>
  <div class="sidebar-footer">
    <div id="scoreText">Score: 0 / 0</div>
    <div class="score-bar"><div class="score-fill" id="scoreFill" style="width:0%"></div></div>
    <div style="margin-top:6px;display:flex;gap:6px">
      <button class="tb-btn" onclick="resetAll()" style="background:rgba(255,255,255,0.1);color:#fff;flex:1;font-size:11px">Reset</button>
      <button class="tb-btn" onclick="showStats()" style="background:rgba(255,255,255,0.1);color:#fff;flex:1;font-size:11px">📊 Stats</button>
    </div>
  </div>
</div>

<div id="toolbar">
  <button class="tb-btn" onclick="prevPage()">&#9664;</button>
  <span id="pageInfo">1 / 142</span>
  <button class="tb-btn" onclick="nextPage()">&#9654;</button>
  <span class="spacer"></span>
  <span id="pageHint"></span>
</div>

<div id="main">
  <div id="pageWrap">
    <img id="pageImg">
    <div id="quizLayer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="statsModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="stats-card">
    <h2>Quiz Results</h2>
    <div class="stats-row">
      <div><div class="stat-num good" id="statCorrect">0</div><div class="stat-label">Correct ✓</div></div>
      <div><div class="stat-num bad" id="statWrong">0</div><div class="stat-label">Wrong ✗</div></div>
    </div>
    <div id="statPct" style="font-size:24px;font-weight:700;margin:10px 0">0%</div>
    <div id="statTotal" style="font-size:13px;opacity:0.6"></div>
    <button class="tb-btn" onclick="document.getElementById('statsModal').classList.remove('show')" style="background:#eee;padding:8px 24px;margin-top:10px">Close</button>
  </div>
</div>

<script>
const TOTAL_PAGES = 142;
let curPage = 1;
let studentAnswers = {};
let revealed = {};

try {
  const s1 = localStorage.getItem('neuroQB_answers'); if (s1) studentAnswers = JSON.parse(s1);
  const s2 = localStorage.getItem('neuroQB_revealed'); if (s2) revealed = JSON.parse(s2);
} catch(e) {}

function saveState() {
  localStorage.setItem('neuroQB_answers', JSON.stringify(studentAnswers));
  localStorage.setItem('neuroQB_revealed', JSON.stringify(revealed));
}

function buildNav() {
  const nav = document.getElementById('navList');
  const filter = (document.getElementById('navSearch').value || '').toLowerCase();
  let html = '';
  for (let p = 1; p <= TOTAL_PAGES; p++) {
    const qd = QUIZ_DATA.pages[String(p)];
    const qCount = qd ? qd.questions.length : 0;
    const isQuiz = qCount > 0;
    const label = `Page ${p}`;
    const badge = isQuiz ? `<span class="badge">${qCount}Q</span>` : '';

    if (filter && !label.toLowerCase().includes(filter) && !String(p).includes(filter)) continue;

    html += `<div class="nav-item${p === curPage ? ' active' : ''}${isQuiz ? ' quiz-page' : ''}" onclick="loadPage(${p})">${label}${badge}</div>`;
  }
  nav.innerHTML = html;
}

function filterNav() { buildNav(); }

function loadPage(num) {
  if (num < 1 || num > TOTAL_PAGES) return;
  curPage = num;
  document.getElementById('pageInfo').textContent = `${num} / ${TOTAL_PAGES}`;
  document.getElementById('pageImg').src = PAGE_IMAGES[num];

  const pd = QUIZ_DATA.pages[String(num)];
  const hint = document.getElementById('pageHint');
  if (pd && pd.questions.length > 0) {
    const withAns = pd.questions.filter(q => q.correct !== null).length;
    hint.textContent = `${pd.questions.length} questions (${withAns} with answers) — Click to select, double-click to reveal`;
  } else {
    hint.textContent = '';
  }

  buildNav();
  renderQuizLayer();
  updateScore();
}

function prevPage() { loadPage(curPage - 1); }
function nextPage() { loadPage(curPage + 1); }

function renderQuizLayer() {
  const layer = document.getElementById('quizLayer');
  layer.innerHTML = '';
  const pd = QUIZ_DATA.pages[String(curPage)];
  if (!pd || !pd.questions) return;

  pd.questions.forEach(q => {
    if (!q.options || q.options.length === 0) return;
    const key = `${curPage}-${q.number}`;
    const studentAns = studentAnswers[key];
    const isRevealed = revealed[key];

    const row = document.createElement('div');
    row.className = 'q-row';
    row.style.top = q.y0 + '%';
    row.style.height = (q.y1 - q.y0) + '%';
    if (isRevealed && studentAns !== undefined) {
      if (q.correct !== null) {
        row.className += studentAns === q.correct ? ' answered-correct' : ' answered-wrong';
      }
    }
    layer.appendChild(row);

    q.options.forEach((opt, oi) => {
      const zone = document.createElement('div');
      zone.className = 'opt-zone';
      zone.style.left = opt.x0 + '%';
      zone.style.top = opt.y0 + '%';
      zone.style.width = (opt.x1 - opt.x0) + '%';
      zone.style.height = (opt.y1 - opt.y0) + '%';

      if (studentAns === oi && !isRevealed) zone.classList.add('selected');
      if (isRevealed) {
        if (q.correct !== null) {
          if (oi === q.correct) zone.classList.add('correct');
          if (studentAns === oi && oi !== q.correct) zone.classList.add('wrong');
        } else {
          if (studentAns === oi) zone.classList.add('selected');
        }
      }

      zone.onclick = e => {
        e.stopPropagation();
        if (isRevealed) return;
        studentAnswers[key] = oi;
        saveState(); renderQuizLayer();
      };
      zone.ondblclick = e => {
        e.stopPropagation();
        if (studentAnswers[key] === undefined) {
          showToast('Select an answer first!', 'wrong');
          return;
        }
        revealed[key] = true;
        saveState(); renderQuizLayer(); updateScore();
        if (q.correct === null) {
          showToast('Answer recorded (no answer key available)', 'info');
        } else if (studentAnswers[key] === q.correct) {
          showToast('Correct! ✓', 'correct');
        } else {
          showToast('Wrong ✗', 'wrong');
        }
      };
      layer.appendChild(zone);
    });

    if (isRevealed && studentAns !== undefined) {
      const badge = document.createElement('div');
      badge.className = 'result-badge show';
      if (q.correct === null) {
        badge.className += ' no-answer';
        badge.textContent = 'No key';
      } else if (studentAns === q.correct) {
        badge.className += ' correct';
        badge.textContent = '✓';
      } else {
        badge.className += ' wrong';
        badge.textContent = '✗';
      }
      badge.style.right = '2%';
      badge.style.top = q.y0 + '%';
      layer.appendChild(badge);
    }
  });
}

function updateScore() {
  let correct = 0, total = 0;
  for (const key in revealed) {
    if (!revealed[key]) continue;
    const [pg, qn] = key.split('-').map(Number);
    const pd = QUIZ_DATA.pages[String(pg)];
    if (pd) {
      const q = pd.questions.find(q => q.number === qn);
      if (q && q.correct !== null) {
        total++;
        if (studentAnswers[key] === q.correct) correct++;
      }
    }
  }
  document.getElementById('scoreText').textContent = `Score: ${correct} / ${total}`;
  document.getElementById('scoreFill').style.width = total > 0 ? (correct/total*100)+'%' : '0%';
}

function showStats() {
  let correct = 0, wrong = 0;
  for (const key in revealed) {
    if (!revealed[key]) continue;
    const [pg, qn] = key.split('-').map(Number);
    const pd = QUIZ_DATA.pages[String(pg)];
    if (pd) {
      const q = pd.questions.find(q => q.number === qn);
      if (q && q.correct !== null) {
        if (studentAnswers[key] === q.correct) correct++; else wrong++;
      }
    }
  }
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  const total = correct + wrong;
  document.getElementById('statPct').textContent = total > 0 ? Math.round(correct/total*100)+'%' : '—';
  document.getElementById('statTotal').textContent = `${total} of 470 questions answered`;
  document.getElementById('statsModal').classList.add('show');
}

function resetAll() {
  if (!confirm('Reset all answers?')) return;
  studentAnswers = {}; revealed = {};
  saveState(); renderQuizLayer(); updateScore();
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type==='correct'?'correct-toast':type==='info'?'info-toast':'wrong-toast');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') prevPage();
  if (e.key === 'ArrowRight') nextPage();
});

buildNav();
loadPage(1);
</script>
</body>
</html>
